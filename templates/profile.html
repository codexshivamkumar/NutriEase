{% extends "base.html" %}{% block title %}Profile — NutriEase{% endblock %}
{% block body %}
<section class="container narrow">
<h1>Your profile</h1>
<form method="post" class="card">
  <label>Full name<input name="full_name" value="{{ current_user.full_name or '' }}"></label>
  <div class="row-2">
    <label>Age<input type="number" name="age" value="{{ p.age or '' }}"></label>
    <label>Gender
      <select name="gender">
        {% for g in ['male','female','other'] %}<option value="{{g}}" {% if p.gender==g %}selected{% endif %}>{{g.title()}}</option>{% endfor %}
      </select>
    </label>
    <label>Height (cm)<input type="number" step="0.1" name="height_cm" value="{{ p.height_cm or '' }}"></label>
    <label>Weight (kg)<input type="number" step="0.1" name="weight_kg" value="{{ p.weight_kg or '' }}"></label>
    <label>Activity
      <select name="activity_level">
        {% for a in ['sedentary','light','moderate','active','athlete'] %}<option value="{{a}}" {% if p.activity_level==a %}selected{% endif %}>{{a.title()}}</option>{% endfor %}
      </select>
    </label>
    <label>Goal
      <select name="goal">
        {% for a in ['weight_loss','muscle_gain','maintain','endurance','recovery'] %}<option value="{{a}}" {% if p.goal==a %}selected{% endif %}>{{a.replace('_',' ').title()}}</option>{% endfor %}
      </select>
    </label>
    <label>Diet preference
      <select name="diet_preference">
        {% for a in ['non-vegetarian','vegetarian','vegan','keto','mediterranean','halal'] %}<option value="{{a}}" {% if p.diet_preference==a %}selected{% endif %}>{{a.title()}}</option>{% endfor %}
      </select>
    </label>
  </div>
  <label>Allergies / dislikes<input name="allergies" value="{{ p.allergies or '' }}"></label>
  <label>Known deficiencies<input name="deficiencies" value="{{ p.deficiencies or '' }}" placeholder="e.g. iron, vitamin D"></label>
  <label>Medical conditions<input name="medical_conditions" value="{{ p.medical_conditions or '' }}"></label>
  <button class="btn primary" type="submit">Save profile</button>
</form>
</section>{% endblock %}
