{% extends "base.html" %}
{% block title %}Staff Login — NutriEase{% endblock %}

{% block body %}
<div class="container section">
  <div class="card" style="max-width:400px; margin: 2rem auto; padding: 2rem;">
    <h2>Staff Login</h2>
    <p class="muted">Enter your email and password to access the portal.</p>
    
    <form method="POST" style="margin-top: 1rem;">
      <div class="form-group" style="margin-bottom: 1rem;">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="staff@nutrease.com" />
      </div>
      <div class="form-group" style="margin-bottom: 1.5rem;">
        <label>Password</label>
        <input type="password" name="password" required />
      </div>
      <button type="submit" class="btn primary full-width">Sign In</button>
    </form>
    
    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: var(--text-muted);">
      Master Admins use: <strong>admin@nutrease.com</strong> / <strong>admin123</strong>
    </div>
  </div>
</div>
{% endblock %}
