{% extends "base.html" %}{% block title %}Sign in — NutriEase{% endblock %}
{% block body %}
<section class="container narrow" style="padding:3rem 1.25rem">
  <div class="card auth">
    <h1>Welcome to <span class="grad">NutriEase</span></h1>
    <p class="muted">Your conversational fitness & nutrition coach.</p>
    <div class="tabs">
      <button class="tab active" data-tab="signin">Sign in</button>
      <button class="tab" data-tab="signup">Create account</button>
    </div>

    <form method="post" class="tab-pane active" id="signin">
      <input type="hidden" name="action" value="signin">
      <label>Email<input type="email" name="email" required></label>
      <label>Password<input type="password" name="password" required></label>
      <button class="btn primary big block" type="submit">Sign in</button>
      <p style="margin-top:.75rem;text-align:center"><a href="{{ url_for('forgot') }}">Forgot password?</a></p>
    </form>

    <form method="post" class="tab-pane" id="signup">
      <input type="hidden" name="action" value="signup">
      <label>Full name<input type="text" name="full_name"></label>
      <label>Email<input type="email" name="email" required></label>
      <label>Password (min 6)<input type="password" name="password" minlength="6" required></label>
      <div class="row-2">
        <label>Age<input type="number" name="age"></label>
        <label>Gender
          <select name="gender">
            <option value="male">Male</option><option value="female">Female</option><option value="other">Other</option>
          </select>
        </label>
        <label>Height (cm)<input type="number" step="0.1" name="height_cm"></label>
        <label>Weight (kg)<input type="number" step="0.1" name="weight_kg"></label>
      </div>
      <button class="btn primary big block" type="submit">Create account</button>
    </form>
  </div>
</section>
<script>
document.querySelectorAll(".tab").forEach(t => t.onclick = () => {
  document.querySelectorAll(".tab,.tab-pane").forEach(x => x.classList.remove("active"));
  t.classList.add("active");
  document.getElementById(t.dataset.tab).classList.add("active");
});
</script>
{% endblock %}
